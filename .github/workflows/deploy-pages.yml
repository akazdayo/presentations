name: Build site and deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Discover presentations
        id: matrix
        run: echo "matrix=$(bun run scripts/presentation.ts matrix)" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    strategy:
      fail-fast: true
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore ${{ matrix.presentation }}
        id: presentation_cache
        uses: actions/cache/restore@v4
        with:
          path: _site/${{ matrix.output }}
          key: site-v1-${{ runner.os }}-${{ matrix.presentation }}-${{ hashFiles(format('{0}/**', matrix.source), 'shared/**', 'scripts/**') }}-${{ matrix.kind == 'typst' && hashFiles('flake.nix', 'flake.lock', 'templates/**') || 'web' }}

      - name: Install Bun
        if: steps.presentation_cache.outputs.cache-hit != 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install Nix for Typst
        if: matrix.kind == 'typst' && steps.presentation_cache.outputs.cache-hit != 'true'
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.presentation }}
        if: steps.presentation_cache.outputs.cache-hit != 'true'
        env:
          PAGES_BASE_PATH: /${{ github.event.repository.name }}
        run: bun run scripts/build-site.ts build "${{ matrix.presentation }}"

      - name: Cache ${{ matrix.presentation }}
        if: steps.presentation_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: _site/${{ matrix.output }}
          key: ${{ steps.presentation_cache.outputs.cache-primary-key }}

      - name: Upload ${{ matrix.presentation }}
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ matrix.presentation }}
          path: _site
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Download site artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: site-*
          path: _site
          merge-multiple: true

      - name: Generate site index
        run: bun run scripts/build-site.ts index

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
