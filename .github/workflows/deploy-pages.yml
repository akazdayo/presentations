name: Build site and deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build site
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: nix develop -c just build-site

      - name: Build the Markdown index with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: _site
          destination: _site-built

      - name: Restore Slidev assets excluded by Jekyll
        shell: bash
        run: |
          while IFS= read -r -d '' source; do
            relative="${source#_site/}"
            destination="_site-built/$relative"
            sudo install -D "$source" "$destination"
          done < <(find _site -type f -name '_*.js' -print0)

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site-built

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
