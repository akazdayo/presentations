name: Build PDFs and deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Check formatting, hooks, and Typst builds
        run: nix flake check

      - name: Build all PDFs and the root page
        env:
          CHROME_DEVEL_SANDBOX: ""
        run: nix develop -c just build-all-pdfs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build the Markdown index with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: _site
          destination: _site-built

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site-built

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
