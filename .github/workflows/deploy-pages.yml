name: Build site and deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - presentation: nostr-one-year
            kind: web
          - presentation: slidev-mobile-claude
            kind: web
          - presentation: nix-lt
            kind: web
          - presentation: post-2603
            kind: typst
          - presentation: nix-journey
            kind: web
          - presentation: nix-cache-05-27
            kind: typst
          - presentation: conversation-thermometer
            kind: web
          - presentation: nix-tee
            kind: web
          - presentation: nix-minecraft
            kind: web
          - presentation: sechack-1st-event
            kind: web
          - presentation: sechack-2nd-event
            kind: typst
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Nix for Typst
        if: matrix.kind == 'typst'
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.presentation }}
        env:
          PAGES_BASE_PATH: /${{ github.event.repository.name }}
        run: bun run scripts/build-site.ts build "${{ matrix.presentation }}"

      - name: Generate site index
        run: bun run scripts/build-site.ts index

      - name: Upload ${{ matrix.presentation }}
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ matrix.presentation }}
          path: _site
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download site artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: site-*
          path: _site
          merge-multiple: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
